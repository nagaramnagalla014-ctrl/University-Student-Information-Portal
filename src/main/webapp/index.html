<!DOCTYPE html>
<html lang="en" ng-app="portalApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>University Student Portal</title>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap-theme.min.css">
    <!-- Custom styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar (shown when logged in) -->
    <nav class="navbar navbar-inverse navbar-fixed-top" ng-show="currentUser.authenticated">
        <div class="container-fluid">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#mainNav">
                    <span class="icon-bar"></span><span class="icon-bar"></span><span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" href="#/">&#127979; UniPortal</a>
            </div>
            <div class="collapse navbar-collapse" id="mainNav">
                <!-- Student nav -->
                <ul class="nav navbar-nav" ng-show="currentUser.role === 'STUDENT'">
                    <li ng-class="{active: isActive('/student/dashboard')}"><a href="#/student/dashboard"><span class="glyphicon glyphicon-home"></span> Dashboard</a></li>
                    <li ng-class="{active: isActive('/student/courses')}"><a href="#/student/courses"><span class="glyphicon glyphicon-book"></span> Courses</a></li>
                    <li ng-class="{active: isActive('/student/grades')}"><a href="#/student/grades"><span class="glyphicon glyphicon-star"></span> Grades</a></li>
                    <li ng-class="{active: isActive('/student/transcript')}"><a href="#/student/transcript"><span class="glyphicon glyphicon-file"></span> Transcript</a></li>
                </ul>
                <!-- Faculty nav -->
                <ul class="nav navbar-nav" ng-show="currentUser.role === 'FACULTY'">
                    <li ng-class="{active: isActive('/faculty/dashboard')}"><a href="#/faculty/dashboard"><span class="glyphicon glyphicon-home"></span> Dashboard</a></li>
                    <li ng-class="{active: isActive('/faculty/grades')}"><a href="#/faculty/grades"><span class="glyphicon glyphicon-pencil"></span> Upload Grades</a></li>
                    <li ng-class="{active: isActive('/faculty/attendance')}"><a href="#/faculty/attendance"><span class="glyphicon glyphicon-calendar"></span> Attendance</a></li>
                </ul>
                <!-- Admin nav -->
                <ul class="nav navbar-nav" ng-show="currentUser.role === 'ADMIN'">
                    <li ng-class="{active: isActive('/admin/dashboard')}"><a href="#/admin/dashboard"><span class="glyphicon glyphicon-dashboard"></span> Dashboard</a></li>
                    <li ng-class="{active: isActive('/admin/students')}"><a href="#/admin/students"><span class="glyphicon glyphicon-user"></span> Students</a></li>
                    <li ng-class="{active: isActive('/admin/courses')}"><a href="#/admin/courses"><span class="glyphicon glyphicon-book"></span> Courses</a></li>
                </ul>
                <!-- Right nav -->
                <ul class="nav navbar-nav navbar-right">
                    <li ng-show="currentUser.authenticated">
                        <a href="#/notifications">
                            <span class="glyphicon glyphicon-bell"></span>
                            <span class="badge badge-notify" ng-show="unreadCount > 0">{{unreadCount}}</span>
                        </a>
                    </li>
                    <li class="dropdown" ng-show="currentUser.authenticated">
                        <a href="#" class="dropdown-toggle" data-toggle="dropdown">
                            <span class="glyphicon glyphicon-user"></span> {{currentUser.name}} <span class="caret"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-right">
                            <li><a href="#"><small class="text-muted">{{currentUser.role}}</small></a></li>
                            <li class="divider"></li>
                            <li><a href="#" ng-click="logout()"><span class="glyphicon glyphicon-log-out"></span> Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main View -->
    <div class="main-wrapper" ng-class="{'with-nav': currentUser.authenticated}">
        <div ng-view></div>
    </div>

    <!-- jQuery & Bootstrap -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <!-- AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular-route.min.js"></script>
    <!-- App JS -->
    <script src="app/app.js"></script>
    <script src="app/services/api.service.js"></script>
    <script src="app/controllers/auth.controller.js"></script>
    <script src="app/controllers/student.controller.js"></script>
    <script src="app/controllers/faculty.controller.js"></script>
    <script src="app/controllers/admin.controller.js"></script>
</body>
</html>
