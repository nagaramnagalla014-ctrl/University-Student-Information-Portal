<div class="login-page">
    <div class="container">
        <div class="row">
            <div class="col-md-5 col-md-offset-3">
                <div class="login-box">
                    <div class="text-center login-header">
                        <span class="glyphicon glyphicon-education login-icon"></span>
                        <h2>UniPortal</h2>
                        <p class="text-muted">University Student Information Portal</p>
                    </div>
                    <div class="alert alert-danger" ng-show="error">
                        <span class="glyphicon glyphicon-exclamation-sign"></span> {{error}}
                    </div>
                    <form ng-submit="login()" name="loginForm">
                        <div class="form-group">
                            <label>Login As</label>
                            <div class="btn-group btn-group-justified" role="group">
                                <div class="btn-group">
                                    <button type="button" class="btn" ng-class="credentials.role === 'STUDENT' ? 'btn-primary' : 'btn-default'" ng-click="credentials.role='STUDENT'">Student</button>
                                </div>
                                <div class="btn-group">
                                    <button type="button" class="btn" ng-class="credentials.role === 'FACULTY' ? 'btn-success' : 'btn-default'" ng-click="credentials.role='FACULTY'">Faculty</button>
                                </div>
                                <div class="btn-group">
                                    <button type="button" class="btn" ng-class="credentials.role === 'ADMIN' ? 'btn-warning' : 'btn-default'" ng-click="credentials.role='ADMIN'">Admin</button>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" class="form-control" ng-model="credentials.email"
                                   placeholder="your@university.edu" required autofocus>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" class="form-control" ng-model="credentials.password"
                                   placeholder="Password" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg btn-block" ng-disabled="loading || loginForm.$invalid">
                            <span ng-show="!loading">Sign In</span>
                            <span ng-show="loading"><span class="glyphicon glyphicon-refresh spinning"></span> Signing in...</span>
                        </button>
                    </form>
                    <hr>
                    <div class="panel panel-default">
                        <div class="panel-heading"><small><strong>Demo Credentials</strong></small></div>
                        <div class="panel-body">
                            <table class="table table-condensed" style="margin:0;font-size:11px;">
                                <tr><th>Role</th><th>Email</th><th>Password</th></tr>
                                <tr><td>Student</td><td>rahul.verma@student.edu</td><td>student123</td></tr>
                                <tr><td>Faculty</td><td>ravi.kumar@university.edu</td><td>faculty123</td></tr>
                                <tr><td>Admin</td><td>admin@university.edu</td><td>admin123</td></tr>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
